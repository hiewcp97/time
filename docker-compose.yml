version: '3.8'

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retention
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retention"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/retention?sslmode=disable
      REDIS_URL: redis:6379
      ROLE: api
      PORT: 8080
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/retention?sslmode=disable
      REDIS_URL: redis:6379
      ROLE: worker
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
